<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>L’égalité des chances au sein de l’école de la République — Kevin COMBE</title>
  <link rel="icon" href="favicon.ico">
  <style>
    :root{
      --bg:#070707;
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.70);
      --line:rgba(255,255,255,.10);
      --r:18px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    }
    .wrap{
      min-height:100svh;
      display:flex;
      justify-content:center;
      padding:18px;
    }
    .page{ width:min(980px, 100%); }
    .top{
      position:sticky;
      top:0;
      z-index:10;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 10px;
      background: rgba(7,7,7,.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
    }
    .title{
      margin:0;
      font-weight:800;
      letter-spacing:.6px;
      text-transform: uppercase;
      font-size: clamp(14px, 2.2vw, 18px);
    }
    .back{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color:#fff;
      text-decoration:none;
      transition:.15s ease;
      white-space:nowrap;
    }
    .back:hover{ background: rgba(255,255,255,.10); transform: translateY(-1px); }
    .icon{ width:18px; height:18px; display:block; }
    .stack{
      padding:18px 0 10px;
      display:flex;
      flex-direction:column;
      gap:16px;
    }
    .pageImg{
      width:100%;
      max-width: 720px;
      margin: 0 auto;
      display:block;
      border-radius: var(--r);
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      user-select:none;
      -webkit-user-drag:none;
      pointer-events:none;
      background:#0b0b0b;
    }
    .hint{
      max-width:720px;
      margin: 0 auto;
      color: var(--muted);
      font-size: .95rem;
      line-height:1.5;
    }
    @media (max-width:520px){
      .wrap{ padding: 12px; }
      .pageImg{ max-width: 100%; border-radius: 16px; }
      .hint{ max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="page">
      <div class="top">
        <h1 class="title">L’égalité des chances au sein de l’école de la République</h1>
        <a class="back" href="index.html" title="Retour">
          <svg class="icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Retour
        </a>
      </div>

      <div class="stack" aria-label="Aperçu (consultation)">
        <p class="hint">Aperçu en consultation.</p>
        <img class="pageImg" src="previews/ecole-republique-p01.png" alt="Page 1">
        <img class="pageImg" src="previews/ecole-republique-p02.png" alt="Page 2">
        <img class="pageImg" src="previews/ecole-republique-p03.png" alt="Page 3">
        <img class="pageImg" src="previews/ecole-republique-p04.png" alt="Page 4">
        <img class="pageImg" src="previews/ecole-republique-p05.png" alt="Page 5">
        <img class="pageImg" src="previews/ecole-republique-p06.png" alt="Page 6">
      </div>
    </div>
  </div>

  <script>
    // dissuasion (comme les autres previews)
    document.addEventListener("contextmenu", (e) => e.preventDefault());
    document.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      const isMac = navigator.platform.toUpperCase().includes("MAC");
      const mod = isMac ? e.metaKey : e.ctrlKey;
      if (mod && (key === "s" || key === "p")) e.preventDefault();
    });
  </script>
</body>
</html>
